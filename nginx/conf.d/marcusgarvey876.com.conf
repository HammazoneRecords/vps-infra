server {
    server_name marcusgarvey876.com www.marcusgarvey876.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Marcus frontend — static files served by nginx directly
    root /var/www/marcus-frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://marcus:5050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/marcusgarvey876.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marcusgarvey876.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name marcusgarvey876.com www.marcusgarvey876.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}
